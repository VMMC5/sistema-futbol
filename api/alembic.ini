# Configuración de Alembic para la API.
# La URL de la base de datos NO se pone aquí: env.py la lee del .env
# (mismas variables que usa la aplicación), para no duplicar credenciales.

[alembic]
script_location = migrations
prepend_sys_path = .
# Formato del nombre de archivo de cada migración: fecha + descripción
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
