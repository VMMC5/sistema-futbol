# Cabeceras que necesita Uptime Kuma. Están en un fichero aparte porque las usan
# DOS location distintas (/monitor y el bloque de rutas de primer nivel) y no
# conviene que se separen: si una de las dos se quedara sin ellas, el panel
# cargaría pero no recibiría datos.
#
# Kuma se comunica por WebSocket (socket.io): TODO el panel —el estado de cada
# monitor, los latidos, los avisos— viaja por ahí, no por peticiones HTTP
# normales. Sin estas tres líneas la página se pinta, pero se queda en
# "Desconectado" para siempre, porque el 101 Switching Protocols nunca llega.
#
# proxy_http_version 1.1 es OBLIGATORIO: HTTP/1.0 no tiene mecanismo de Upgrade,
# y por defecto nginx habla HTTP/1.0 con el backend.
proxy_http_version 1.1;
proxy_set_header Upgrade    $http_upgrade;
proxy_set_header Connection "upgrade";

# El WebSocket se queda abierto y en silencio largos ratos. Con el timeout por
# defecto (60s) nginx lo cortaría y el panel viviría reconectándose.
proxy_read_timeout 1h;

# Este directorio NO es /etc/nginx/templates a propósito: la imagen pasa envsubst
# por todo lo que hay allí, y $http_upgrade no debe tocarse.
