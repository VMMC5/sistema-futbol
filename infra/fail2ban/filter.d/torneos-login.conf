# Filtro propio: fuerza bruta contra el login del sistema de torneos
# ==================================================================
#
# Se instala en /etc/fail2ban/filter.d/torneos-login.conf.
#
# Los filtros de nginx que trae fail2ban de serie (`nginx-http-auth`) solo
# entienden el `auth_basic` de nginx, que nosotros no usamos: nuestro login lo
# valida la aplicación, no el servidor web. Así que hace falta un filtro que
# conozca NUESTRAS rutas.
#
# Lee el access.log de nginx (formato `combined`, el de serie de la imagen), que
# es el ÚNICO sitio donde se ve la IP real del atacante: la API y el panel viven
# en la EC2 privada y para ellos todo el tráfico viene de nginx.
#
# Las dos vías de login del sistema:
#
#   1. POST /api/auth/login   -> la API (api/app/routers/auth.py).
#      Credenciales malas => 401. Inequívoco.
#
#   2. POST /login            -> el panel Flask (web/app/app.py:130).
#      OJO, aquí hay que hilar fino: el panel NO devuelve 401 cuando fallan las
#      credenciales; vuelve a pintar el formulario con un flash de error, o sea
#      un 200. Lo que distingue el fallo del éxito es que el login CORRECTO
#      hace `redirect(url_for("dashboard"))`, o sea un 302.
#      Por lo tanto:  POST /login + 200  ==  intento fallido.
#      (Un 302 en POST /login es un login correcto y no cuenta.)
#
# Si algún día el panel devolviera 401 en el fallo, la segunda regla dejaría de
# cazar nada y habría que actualizarla. Está anotado en el informe de la fase.

[Definition]

# En el formato `combined`, la petición entera va entre comillas e incluye la
# versión del protocolo:  "POST /api/auth/login HTTP/1.1" 401
# De ahí el [^"]* : cubre la query string y el ` HTTP/1.1` final.
# El \[\] no es un error: fail2ban ya ha consumido la fecha de los corchetes con
# el `datepattern` de abajo, y lo que queda en la línea son los corchetes vacíos.
failregex = ^<HOST> \- \S+ \[\] \"POST /api/auth/login[^\"]*\" 401\b
            ^<HOST> \- \S+ \[\] \"POST /login[^\"]*\" 200\b

ignoreregex =

# nginx escribe la fecha entre corchetes: [14/Jul/2026:08:12:33 +0000]
datepattern = ^[^\[]*\[({DATE})
              {^LN-BEG}
