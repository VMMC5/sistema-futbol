services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data   # los datos sobreviven a reinicios

  api:
    build: ./api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./api:/code          # código local se refleja dentro del contenedor
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db

  web:
    build: ./web
    command: flask run --host 0.0.0.0 --port 5000 --debug
    volumes:
      - ./web:/code
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      - api

volumes:
  pgdata:
